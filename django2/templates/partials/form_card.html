{% load django_bootstrap5 %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <h1 class="mb-4">{{ title }}</h1>
      <div class="card shadow-sm">
        {% bootstrap_messages %}
        <div class="card-body">
          <form autocomplete="off" action="{{ action }}" method="{{ method|default:'post' }}" class="form"{% if enctype %} enctype="{{ enctype }}"{% endif %}>
            {% csrf_token %}
            {% bootstrap_form form %}
            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg">{{ submit_label|default:"Submit" }}</button>
            </div>
          </form>
          {% if extra_content %}
            {{ extra_content }}
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</div>
